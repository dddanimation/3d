<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Foundations AR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* Background must be transparent to see the camera video behind it */
      background: transparent !important;
      touch-action: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: #000; /* Solid black only for the start screen */
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      font-family: sans-serif;
      transition: opacity 0.8s ease, visibility 0.8s;
    }

    #overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #start-btn {
      padding: 16px 36px;
      font-size: 16px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
    }

    /* Hide MindAR default UI */
    .mindar-ui-scanning, .mindar-ui-loading {
      display: none !important;
    }
  </style>
</head>

<body>

  <div id="overlay">
    <h1 style="letter-spacing: 3px; font-weight: 300;">FOUNDATIONS</h1>
    <img src="https://dddanimation.github.io/3d/enslaved.jpg" 
         style="width: 150px; margin-bottom: 25px; border: 1px solid #444;">
    <button id="start-btn">Enter Experience</button>
  </div>

  <a-scene
    embedded
    mindar-image="
      imageTargetSrc: https://dddanimation.github.io/3d/targets.mind;
      autoStart: false;
      uiScanning: false;
      uiLoading: false;
    "
    renderer="
      alpha: true; 
      colorManagement: true;
      physicallyCorrectLights: true;
      exposure: 0.85; 
      toneMapping: ACESFilmic;
    "
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="sculpture" src="https://dddanimation.github.io/3d/enslaved.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-light type="ambient" intensity="0.2"></a-light>
    <a-light type="directional" position="1 4 2" intensity="0.7"></a-light>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity rotation="90 60 0" scale="0.19 0.19 0.19">
        <a-gltf-model
          src="#sculpture"
          animation-mixer>
        </a-gltf-model>
      </a-entity>
    </a-entity>

  </a-scene>

  <script>
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');
    const sceneEl = document.querySelector('a-scene');

    startBtn.addEventListener('click', () => {
      overlay.classList.add('hidden');
      
      // Start the AR engine
      if (sceneEl.hasLoaded) {
        sceneEl.systems["mindar-image-system"].start();
      } else {
        sceneEl.addEventListener("renderstart", () => {
          sceneEl.systems["mindar-image-system"].start();
        });
      }
    });
  </script>

</body>
</html>
