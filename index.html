<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title></title>
  <link rel="preload" href="https://dddanimation.github.io/3d/enslaved.glb" as="fetch" crossorigin="anonymous">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    body.loading-bg { background: #000 !important; }
    a-scene { background: transparent !important; }
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; color: white; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 9999;
      font-family: sans-serif; text-align: center;
    }
    #start-btn {
      padding: 18px 40px; font-size: 18px; background: #28a745; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
      text-transform: uppercase; letter-spacing: 1px;
    }
    #start-btn:disabled { background: #555; cursor: default; }
    #marker-preview { width: 150px; border: 1px solid #444; margin-bottom: 25px; opacity: 0.8; }
  </style>
</head>
<body class="loading-bg">

  <div id="overlay">
    <img id="marker-preview" src="YOUR_MARKER_PREVIEW.jpg" alt="Marker preview" />
    <button id="start-btn">Start AR</button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: YOUR_MIND_FILE.mind; autoStart: false;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="model" src="https://dddanimation.github.io/3d/enslaved.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        id="ar-model"
        src="#model"
        position="0 0 0"
        scale="0.5 0.5 0.5"
        animation-mixer
      ></a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    // ─── iOS-safe Audio Manager ───────────────────────────────────────────────
    // iOS blocks ALL audio until a direct user gesture. We must:
    //   1. Create AudioContext inside the tap handler (not before)
    //   2. Resume the context synchronously in the same gesture
    //   3. Use Web Audio API (HTMLAudioElement alone is unreliable in WKWebView)

    let audioCtx = null;
    let audioSource = null;
    let audioBuffer = null;
    let audioReady = false;

    // Silently pre-fetch the audio bytes so playback is instant later
    async function fetchAudioBuffer(ctx) {
      const res = await fetch('https://dddanimation.github.io/3d/enslaved.mp3');
      const arrayBuffer = await res.arrayBuffer();
      return ctx.decodeAudioData(arrayBuffer);
    }

    // Call this INSIDE the button click handler to unlock iOS audio
    async function unlockAndPrepareAudio() {
      // 1. Create context synchronously in the gesture handler
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      // 2. Resume immediately — iOS requires this inside the gesture
      if (audioCtx.state === 'suspended') {
        await audioCtx.resume();
      }

      // 3. Play a zero-length silent buffer to fully unlock the audio session
      const silentBuffer = audioCtx.createBuffer(1, 1, 22050);
      const silentSource = audioCtx.createBufferSource();
      silentSource.buffer = silentBuffer;
      silentSource.connect(audioCtx.destination);
      silentSource.start(0);

      // 4. Fetch and decode the real audio (can be async now, context is unlocked)
      try {
        audioBuffer = await fetchAudioBuffer(audioCtx);
        audioReady = true;
        console.log('Audio ready');
      } catch (e) {
        console.warn('Audio fetch failed:', e);
      }
    }

    function playAudio() {
      if (!audioReady || !audioCtx || !audioBuffer) return;
      // Stop any existing playback
      if (audioSource) {
        try { audioSource.stop(); } catch(e) {}
      }
      audioSource = audioCtx.createBufferSource();
      audioSource.buffer = audioBuffer;
      audioSource.loop = true;                     // set false if you don't want looping
      audioSource.connect(audioCtx.destination);
      audioSource.start(0);
    }

    function stopAudio() {
      if (audioSource) {
        try { audioSource.stop(); } catch(e) {}
        audioSource = null;
      }
    }

    // ─── AR Scene Setup ───────────────────────────────────────────────────────
    const startBtn = document.getElementById('start-btn');
    const overlay  = document.getElementById('overlay');
    const sceneEl  = document.querySelector('a-scene');

    startBtn.addEventListener('click', async () => {
      startBtn.disabled = true;
      startBtn.textContent = 'Loading…';

      // Unlock audio IN this click handler — this is the iOS-required gesture
      await unlockAndPrepareAudio();

      // Start MindAR
      const arSystem = sceneEl.systems['mindar-image-system'];
      arSystem.start();

      overlay.style.display = 'none';
    });

    // Play audio when marker is found, stop when lost
    sceneEl.addEventListener('targetFound', () => {
      console.log('Marker found — playing audio');
      playAudio();
    });

    sceneEl.addEventListener('targetLost', () => {
      console.log('Marker lost — stopping audio');
      stopAudio();
    });
  </script>

</body>
</html>
