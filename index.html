<div style="width: 100%; height: 80vh; position: relative; overflow: hidden; background-color: #000;">
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <div id="loading-screen" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; font-family: sans-serif; text-align: center; padding: 20px;">
    <h2 style="margin-bottom: 15px; letter-spacing: 2px;">FOUNDATIONS AR</h2>
    
    <img src="https://dddanimation.github.io/3d/enslaved.jpg" style="width: 150px; border: 1px solid #fff; margin-bottom: 25px; border-radius: 4px;">
    
    <button id="start-btn" style="padding: 18px 36px; font-size: 18px; background: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase;">Start Experience</button>
    
    <p id="status-text" style="margin-top: 20px; font-size: 12px; opacity: 0.6;">Ensure camera permissions are allowed</p>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: https://dddanimation.github.io/3d/targets.mind; autoStart: false; uiScanning: yes; maxTrack: 1;" 
    embedded
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="sculpture" src="https://dddanimation.github.io/3d/enslaved.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>

    <a-entity mindar-image-target="targetIndex: 0">
      
      <a-sphere position="0 0 0" radius="0.05" color="#00FF00" material="emissive: #00FF00; emissiveIntensity: 1;"></a-sphere>

      <a-gltf-model 
        src="#sculpture" 
        position="0 0 0.1" 
        scale="0.001 0.001 0.001"
        rotation="0 0 0"
        animation-mixer>
      </a-gltf-model>

    </a-entity>
  </a-scene>

  <script>
    const startBtn = document.getElementById('start-btn');
    const loadingScreen = document.getElementById('loading-screen');
    const statusText = document.getElementById('status-text');
    const sceneEl = document.querySelector('a-scene');

    startBtn.addEventListener('click', () => {
      statusText.innerText = "Opening Camera...";
      const arSystem = sceneEl.systems["mindar-image-system"];
      arSystem.start(); 
    });

    // When the AR engine is ready, hide the welcome screen
    sceneEl.addEventListener("arReady", () => {
      loadingScreen.style.display = "none";
    });

    // Error logging for on-site debugging
    sceneEl.addEventListener("arError", (event) => {
      statusText.innerText = "Error: Camera access is required for AR.";
      statusText.style.color = "red";
    });
  </script>
</div>
