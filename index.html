<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Foundations AR</title>

  <!-- A-Frame + MindAR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
      touch-action: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      font-family: sans-serif;
      transition: opacity 0.6s ease;
    }

    #overlay h1 {
      letter-spacing: 3px;
      font-weight: 300;
      margin-bottom: 25px;
    }

    #marker-preview {
      width: 150px;
      border: 1px solid #444;
      margin-bottom: 25px;
    }

    #start-btn {
      padding: 18px 40px;
      font-size: 18px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
    }

    /* Hide MindAR default UI */
    .mindar-ui-scanning,
    .mindar-ui-loading {
      display: none !important;
    }
  </style>
</head>

<body>

  <!-- Intro Overlay -->
  <div id="overlay">
    <h1>FOUNDATIONS</h1>
    <img id="marker-preview"
         src="https://dddanimation.github.io/3d/enslaved.jpg"
         alt="Marker preview">
    <button id="start-btn">Enter Experience</button>
  </div>

  <!-- AR Scene -->
  <a-scene
    mindar-image="
      imageTargetSrc: https://dddanimation.github.io/3d/targets.mind;
      autoStart: false;
      uiScanning: false;
      uiLoading: false;
      maxTrack: 1;
      filterMinCF: 0.0001;
      filterBeta: 0.001;
    "
    renderer="
      colorManagement: true;
      physicallyCorrectLights: true;
      alpha: true;
      precision: mediump;
      antialias: false;
    "
    color-space="sRGB"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets crossorigin="anonymous">
      <a-asset-item
        id="sculpture"
        src="https://dddanimation.github.io/3d/enslaved.glb">
      </a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Lighting -->
    <a-light type="ambient" intensity="0.35"></a-light>
    <a-light type="directional" position="0 3 1" intensity="0.9"></a-light>
    <a-light type="hemisphere" intensity="0.3" groundColor="#222"></a-light>

    <!-- Target -->
    <a-entity mindar-image-target="targetIndex: 0">
      <!-- Stabilization container -->
      <a-entity
        position="0 0 0"
        rotation="90 0 0"
        scale="0.19 0.19 0.19">
        <a-gltf-model
          src="#sculpture"
          animation-mixer>
        </a-gltf-model>
      </a-entity>
    </a-entity>

  </a-scene>

  <!-- Logic -->
  <script>
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');
    const sceneEl = document.querySelector('a-scene');

    // Prevent mobile scroll / rubber band
    document.body.addEventListener(
      'touchmove',
      e => e.preventDefault(),
      { passive: false }
    );

    // Safe AR start
    startBtn.addEventListener('click', () => {
      document.body.style.backgroundColor = "transparent";

      if (sceneEl.hasLoaded) {
        sceneEl.systems["mindar-image-system"].start();
      } else {
        sceneEl.addEventListener("renderstart", () => {
          sceneEl.systems["mindar-image-system"].start();
        }, { once: true });
      }
    });

    // Hide overlay only after first successful target detection
    let entered = false;
    sceneEl.addEventListener("targetFound", () => {
      if (!entered) {
        overlay.style.opacity = "0";
        overlay.style.pointerEvents = "none";
        entered = true;
      }
    });
  </script>

</body>
</html>
