<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Foundations AR | Qrcky</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    /* Absolute reset to kill all borders and margins */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      -webkit-tap-highlight-color: transparent;
    }

    /* Force the A-Frame canvas to be borderless */
    canvas {
      border: none !important;
      outline: none !important;
    }

    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; color: white;
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; z-index: 9999; font-family: sans-serif;
    }
    
    #start-btn {
      padding: 18px 40px; font-size: 18px; background: #fff; color: #000;
      border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
      text-transform: uppercase;
    }

    #marker-preview {
      width: 160px; border: 1px solid rgba(255,255,255,0.3); margin-bottom: 30px;
    }

    /* This hides the MindAR default white 'scanning' frame if that was the border */
    .mindar-ui-scanning, .mindar-ui-loading {
      display: none !important;
    }
  </style>
</head>
<body>

  <div id="overlay">
    <h1 style="letter-spacing: 3px; font-weight: 300; margin-bottom: 25px;">FOUNDATIONS</h1>
    <img id="marker-preview" src="https://dddanimation.github.io/3d/enslaved.jpg">
    <button id="start-btn">Enter Experience</button>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: https://dddanimation.github.io/3d/targets.mind; autoStart: false; uiScanning: false; uiLoading: false; maxTrack: 1;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="sculpture" src="https://dddanimation.github.io/3d/enslaved.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model 
        src="#sculpture" 
        position="0 0 0.1" 
        scale="0.005 0.005 0.005"
        rotation="0 0 0"
        animation-mixer>
      </a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');
    const sceneEl = document.querySelector('a-scene');

    startBtn.addEventListener('click', () => {
      const arSystem = sceneEl.systems["mindar-image-system"];
      arSystem.start(); 
    });

    sceneEl.addEventListener("arReady", () => {
      overlay.style.display = "none";
    });
  </script>
</body>
</html>
