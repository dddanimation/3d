<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Foundations AR | Qrcky</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    
    /* Overlay for the Start Button */
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); color: white;
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; z-index: 9999; font-family: sans-serif;
    }
    
    #start-btn {
      padding: 20px 40px; font-size: 20px; background: #fff; color: #000;
      border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
      text-transform: uppercase; letter-spacing: 1px;
    }

    #marker-preview {
      width: 150px; border: 2px solid #fff; border-radius: 8px; margin-bottom: 30px;
    }

    /* Ensures the AR video feed covers the whole screen */
    .mindar-ui-scanning { z-index: 100; }
  </style>
</head>
<body>

  <div id="overlay">
    <h1 style="margin-bottom: 10px;">FOUNDATIONS AR</h1>
    <img id="marker-preview" src="https://dddanimation.github.io/3d/enslaved.jpg" alt="Scan this marker">
    <button id="start-btn">Start Experience</button>
    <p style="margin-top: 20px; font-size: 14px; opacity: 0.7;">Point at the marker once the camera starts</p>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: https://dddanimation.github.io/3d/targets.mind; autoStart: false; uiScanning: yes; maxTrack: 1;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="sculpture" src="https://dddanimation.github.io/3d/enslaved.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-light type="ambient" intensity="1.2"></a-light>
    <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model 
        src="#sculpture" 
        position="0 0 0.1" 
        scale="0.05 0.05 0.05"
        rotation="0 0 0"
        animation-mixer>
      </a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');
    const sceneEl = document.querySelector('a-scene');

    startBtn.addEventListener('click', () => {
      // Start the AR engine
      const arSystem = sceneEl.systems["mindar-image-system"];
      arSystem.start(); 
    });

    sceneEl.addEventListener("arReady", () => {
      overlay.style.display = "none";
    });

    sceneEl.addEventListener("arError", (event) => {
      alert("Camera error: Please ensure you are using HTTPS and have granted camera permissions.");
    });
  </script>
</body>
</html>
