<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Foundations AR</title>
  
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

  <style>
    /* Force transparency on everything except the 3D model */
    html, body { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background: transparent !important; 
    }

    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; color: white; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 9999; font-family: sans-serif;
    }
    
    #start-btn { 
      padding: 18px 40px; font-size: 16px; background: #fff; color: #000; 
      border: none; border-radius: 4px; cursor: pointer; font-weight: bold; 
      text-transform: uppercase; 
    }

    #marker-preview { width: 150px; border: 1px solid #444; margin-bottom: 20px; }

    /* Hide MindAR default UI */
    .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }
    
    /* Ensure the A-Frame canvas is transparent to show the video feed */
    .a-canvas { background-color: transparent !important; }
  </style>
</head>
<body>

  <div id="overlay">
    <h2 style="letter-spacing: 2px; font-weight: 300;">FOUNDATIONS</h2>
    <img id="marker-preview" src="https://dddanimation.github.io/3d/enslaved.jpg">
    <button id="start-btn">View in your space</button>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: https://dddanimation.github.io/3d/targets.mind; autoStart: false; uiScanning: false; filterMinCF: 0.0001; filterBeta: 0.001;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights: true, toneMapping: neutral, alpha: true" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="sculpture" src="https://dddanimation.github.io/3d/enslaved.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable"></a-camera>

    <a-light type="ambient" intensity="0.6"></a-light>
    <a-light type="directional" position="1 2 1" intensity="0.9"></a-light>

    <a-entity mindar-image-target="targetIndex: 0">
      
      <a-entity position="0 -0.35 0.1">
          
          <a-gltf-model 
            src="#sculpture" 
            scale="0.05 0.05 0.05"
            rotation="0 0 0" 
            animation-mixer>

            <a-entity position="-3.04 1.89 0.39" class="clickable">
                <a-sphere radius="0.15" color="#fff" material="emissive: #fff; emissiveIntensity: 1"></a-sphere>
                <a-entity 
                    text="value: Anne Celestia; align: center; width: 3; color: black;" 
                    position="0 0.4 0" 
                    geometry="primitive: plane; height: 0.3; width: 1.2" 
                    material="color: white; opacity: 0.9">
                </a-entity>
            </a-entity>

          </a-gltf-model>

          <a-plane rotation="-90 0 0" width="2" height="2" material="shadowOnly: true" shadow="receive: true" opacity="0.4"></a-plane>
      </a-entity>

    </a-entity>
  </a-scene>

  <script>
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');
    const sceneEl = document.querySelector('a-scene');

    startBtn.addEventListener('click', () => {
      // Start the AR system
      sceneEl.systems["mindar-image-system"].start(); 
    });

    sceneEl.addEventListener("arReady", () => {
      // Hide the black overlay once the camera feed is ready
      overlay.style.display = "none";
      // Final force-fix for the background
      document.body.style.backgroundColor = "transparent";
    });

    sceneEl.addEventListener("arError", (event) => {
      alert("Please ensure you are using Safari (iOS) or Chrome (Android) over HTTPS.");
    });
  </script>
</body>
</html>
