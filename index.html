<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Foundations AR - Baked</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
      touch-action: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      font-family: sans-serif;
      transition: opacity 0.6s ease;
    }

    #start-btn {
      padding: 18px 40px;
      font-size: 18px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
    }

    /* Hide MindAR default UI */
    .mindar-ui-scanning, .mindar-ui-loading {
      display: none !important;
    }
  </style>
</head>

<body>

  <div id="overlay">
    <h1 style="letter-spacing: 3px; font-weight: 300; margin-bottom: 25px;">FOUNDATIONS</h1>
    <button id="start-btn">Enter Experience</button>
  </div>

  <a-scene
    mindar-image="
      imageTargetSrc: https://dddanimation.github.io/3d/targets.mind;
      autoStart: false;
      uiScanning: false;
      uiLoading: false;
    "
    renderer="alpha: true; colorManagement: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="sculpture" src="https://dddanimation.github.io/3d/enslaved.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity rotation="90 60 0" scale="0.19 0.19 0.19">
        <a-gltf-model
          src="#sculpture"
          force-unlit>
        </a-gltf-model>
      </a-entity>
    </a-entity>

  </a-scene>

  <script>
    // Component to force the model to use an unlit (Basic) material
    AFRAME.registerComponent('force-unlit', {
      init: function () {
        this.el.addEventListener('model-loaded', () => {
          const mesh = this.el.getObject3D('mesh');
          mesh.traverse(node => {
            if (node.isMesh) {
              // Switch to MeshBasicMaterial to use baked textures only
              const oldMat = node.material;
              node.material = new THREE.MeshBasicMaterial({
                map: oldMat.map,
                color: 0xffffff,
                transparent: oldMat.transparent,
                alphaTest: oldMat.alphaTest,
                side: oldMat.side
              });
            }
          });
        });
      }
    });

    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');
    const sceneEl = document.querySelector('a-scene');

    startBtn.addEventListener('click', () => {
      overlay.style.opacity = "0";
      setTimeout(() => { overlay.style.display = "none"; }, 600);

      if (sceneEl.hasLoaded) {
        sceneEl.systems["mindar-image-system"].start();
      } else {
        sceneEl.addEventListener("renderstart", () => {
          sceneEl.systems["mindar-image-system"].start();
        });
      }
    });
  </script>

</body>
</html>
